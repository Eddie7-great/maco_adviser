name: Update macro data

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-macro-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PDF text extraction tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Fetch FRED data
        run: node scripts/fetch-fred-data.mjs

      - name: Fetch KCIF monthly reports
        run: node scripts/fetch-kcif-reports.mjs

      - name: Fetch Federal Reserve speeches
        run: node scripts/fetch-fed-speeches.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fred-data.json data/kcif-reports.json data/fed-speeches.json
          git diff --cached --quiet || git commit -m "Update macro data"
          git push
